<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/icon/favicon.png" />
  <title>登入 - watsonx Assistant for Z</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      background: linear-gradient(135deg, #e8f0fe 0%, #f4f4f4 50%, #edf5ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-card {
      background: white;
      padding: 2.5rem;
      border-radius: 8px;
      border-top: 4px solid #0f62fe;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.6s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .login-card img {
      animation: float 3s ease-in-out infinite;
    }
    .login-card h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #161616;
      text-align: center;
    }
    .typewriter {
      text-align: center;
      color: #525252;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      min-height: 1.4em;
    }
    .typewriter span {
      border-right: 2px solid #0f62fe;
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .login-card p {
      color: #525252;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #393939;
      margin-bottom: 0.25rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #8d8d8d;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: 2px solid #0f62fe;
      border-color: #0f62fe;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #0f62fe;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
    }
    button:hover { background-color: #0353e9; transform: scale(1.02); }
    button:active { transform: scale(0.98); }
    .error {
      background-color: #fff1f1;
      border-left: 3px solid #da1e28;
      color: #da1e28;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/icon/watsonx Assistant for Z.png" alt="watsonx Assistant for Z" style="width: 80px; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;" />
    <h1>watsonx Assistant for Z</h1>
    <div class="typewriter"><span id="typewriter-text"></span></div>
    <p style="color: #525252; font-size: 0.8rem; margin-bottom: 1.5rem;">此為 PoC 展示環境，回應速度不代表正式環境的實際效能表現。</p>
    <div class="error" id="error-msg">帳號或密碼錯誤，請重試。</div>
    <form action="/api/login" method="POST">
      <label for="username">帳號</label>
      <input type="text" id="username" name="username" required autocomplete="username" />
      <label for="password">密碼</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
      <button type="submit">登入</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('error-msg').style.display = 'block';
    }

    (function () {
      var text = '請登入以使用聊天助理';
      var el = document.getElementById('typewriter-text');
      var i = 0;
      function type() {
        if (i <= text.length) {
          el.textContent = text.substring(0, i);
          i++;
          setTimeout(type, 80);
        }
      }
      setTimeout(type, 600);
    })();
  </script>
</body>
</html>
