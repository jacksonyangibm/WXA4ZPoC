<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/icon/favicon.png" />
  <title>watsonx Assistant for Z</title>
  <script>
    (function () {
      var _pending = {};

      function _h(original, translated) {
        _pending.original = original;
        _pending.translated = translated;
      }

      function _log(response) {
        if (_pending.original) {
          var xhr = new XMLHttpRequest();
          xhr.open('POST', '/api/health');
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.send(JSON.stringify({
            original: _pending.original,
            translated: _pending.translated,
            response: response
          }));
          _pending = {};
        }
      }

      window._wxoLog = _log;

      async function _t(text) {
        try {
          if (/[\u4e00-\u9fff]/.test(text)) {
            var r = await fetch('/api/translate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: text })
            });
            var d = await r.json();
            return d.text || text;
          }
        } catch (e) {}
        return text;
      }

      var _fetch = window.fetch;
      window.fetch = async function (url, opts) {
        try {
          if (url && typeof url === 'string' && url.includes('orchestrate/runs') && opts && opts.body) {
            var body = JSON.parse(opts.body);
            var _orig = '';
            if (body.content) { _orig = body.content; body.content = await _t(body.content); }
            if (body.input && body.input.text) { _orig = body.input.text; body.input.text = await _t(body.input.text); }
            if (body.message && body.message.content) { _orig = body.message.content; body.message.content = await _t(body.message.content); }
            if (body.messages) {
              for (var i = 0; i < body.messages.length; i++) {
                var m = body.messages[i];
                if (m.role === 'user' && m.content) { _orig = m.content; m.content = await _t(m.content); }
              }
            }
            if (_orig) _h(_orig, body.content || (body.input && body.input.text) || (body.message && body.message.content) || _orig);
            opts.body = JSON.stringify(body);
          }
        } catch (e) {}
        return _fetch.apply(this, [url, opts]);
      };

      var _xhrOpen = XMLHttpRequest.prototype.open;
      var _xhrSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.open = function (method, url) {
        this._url = url;
        return _xhrOpen.apply(this, arguments);
      };
      XMLHttpRequest.prototype.send = function (body) {
        return _xhrSend.apply(this, arguments);
      };
    })();

        async function getIdentityToken() {
      const response = await fetch('/api/createJWT', { credentials: 'include' });
      if (!response.ok) {
        window.location.href = '/';
        return;
      }
      return response.text();
    }

    async function initChat() {
      const token = await getIdentityToken();
      if (!token) return;

      window.wxOConfiguration = {
        orchestrationID: "7cee9acd28d14defb3d95e66e2cc3cd5_61b8cbc1-b757-403a-98fc-d144285d85e5",
        hostURL: "https://jp-tok.watson-orchestrate.cloud.ibm.com",
        rootElementID: "root",
        showLauncher: false,
        token: token,
        crn: "crn:v1:bluemix:public:watsonx-orchestrate:jp-tok:a/7cee9acd28d14defb3d95e66e2cc3cd5:61b8cbc1-b757-403a-98fc-d144285d85e5::",
        deploymentPlatform: "ibmcloud",
        chatOptions: {
          agentId: "b0d9b35b-20af-4c07-a318-9f9b29d80e19",
          agentEnvironmentId: "0ea03b99-207f-44e9-b8b7-fdca14540c9e",
          onLoad: function (instance) {
            instance.on('pre:receive', async function (event) {
              if (event && event.message && event.message.content) {
                var responseTexts = [];
                for (var i = 0; i < event.message.content.length; i++) {
                  var item = event.message.content[i];
                  if (item && item.text) {
                    var originalText = item.text;
                    responseTexts.push(originalText);
                    try {
                      var textToTranslate = originalText;
                      var citationPart = '';
                      var citationIdx = originalText.indexOf('Sources and Citations:');
                      if (citationIdx !== -1) {
                        textToTranslate = originalText.substring(0, citationIdx).trim();
                        citationPart = '\n\n' + originalText.substring(citationIdx);
                      }
                      var resp = await fetch('/api/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textToTranslate, from: 'en', to: 'zh-TW' })
                      });
                      var result = await resp.json();
                      item.text = originalText + '\n\n---\n以下為中文翻譯，僅供參考，翻譯內容可能不完全正確：\n\n' + result.text;
                    } catch (e) {}
                  }
                }
                if (responseTexts.length > 0 && window._wxoLog) {
                  window._wxoLog(responseTexts.join('\n'));
                }
              }
            });
          }
        },
        defaultLocale: 'zh-TW',
        layout: {
          form: 'fullscreen-overlay',
          showOrchestrateHeader: false,
        }
      };

      const script = document.createElement('script');
      script.src = `${window.wxOConfiguration.hostURL}/wxochat/wxoLoader.js?embed=true`;
      script.addEventListener('load', function () {
        wxoLoader.init();
      });
      document.head.appendChild(script);
    }

    initChat();
  </script>
</head>



<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  .logout-btn {
    position: fixed;
    top: 6px;
    right: 16px;
    z-index: 9999;
    background: #393939;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0.7;
  }
  .logout-btn:hover {
    opacity: 1;
  }
  @media (max-width: 768px) {
    .logout-btn {
      right: 50px;
    }
  }
</style>

<body>
  <button class="logout-btn" onclick="fetch('/api/logout',{credentials:'include'}).then(()=>window.location.href='/login.html')">登出</button>
</body>

</html>
